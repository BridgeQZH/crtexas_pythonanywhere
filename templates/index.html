<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ config.SITE_TITLE or "CRTexas · 皇室战争卡组生成器" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

  <!-- Language switcher -->
  <div class="lang-bar">
    <a href="{{ url_for('main.set_lang', lang_code='zh') }}"
       class="{{ 'lang-active' if lang=='zh' else '' }}">中文</a>
    <span class="lang-sep">|</span>
    <a href="{{ url_for('main.set_lang', lang_code='en') }}"
       class="{{ 'lang-active' if lang=='en' else '' }}">English</a>
  </div>

  <div class="page-wrapper">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-crown">👑</div>
      <h1 class="hero-title">CRTexas</h1>
      <p class="hero-sub">皇室战争 · 卡组生成器</p>
    </div>

    <!-- Seed Form Panel -->
    <div class="glass-panel">
      <form action="{{ url_for('main.start_game') }}" method="post" class="seed-form">

        <div class="step-label">① {{ t('seed_ph') }}</div>
        <input type="text" name="seed" required pattern="\d{4}" maxlength="4"
               inputmode="numeric"
               placeholder="0000"
               class="seed-input">

        <div class="step-label">② 选择你的阵营</div>
        <div class="btn-row">
          <button type="submit" name="color" value="blue" class="btn-faction btn-blue">
            🔵 {{ t('blue_btn') }}
          </button>
          <button type="submit" name="color" value="red" class="btn-faction btn-red">
            🔴 {{ t('red_btn') }}
          </button>
        </div>

      </form>
    </div>

    <!-- How-to Panel -->
    <div class="glass-panel">
      <h3 class="panel-title">如何使用</h3>
      <ol class="how-list">
        <li>输入今日共享的 4 位数字种子</li>
        <li>选择你的阵营：蓝方或红方</li>
        <li>从公共卡池和私人卡池中各选若干张，共选 8 张</li>
        <li>选择塔楼，点击按钮打开皇室战争复制卡组</li>
      </ol>
    </div>

    <!-- Video Panel -->
    <div class="glass-panel">
      <h3 class="panel-title">教学视频</h3>
      <div class="yt-wrapper">
        <iframe
          src="https://www.youtube.com/embed/L_ZWaW9rVGs"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>
    </div>

    <footer class="footer-note">© BridgeQZH &nbsp;·&nbsp; bilibili</footer>

  </div>
</body>
</html>
